<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel TV - Atendimento</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #2980b9; --bg: #1a1a1a; }
        body { margin: 0; padding: 0; background: var(--bg); font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #header-estabelecimento { height: 70px; background: white; display: flex; align-items: center; justify-content: center; border-bottom: 5px solid var(--accent); }
        #header-estabelecimento h1 { color: var(--primary); font-size: 1.8rem; margin: 0; }
        
        #corpo { flex: 1; display: flex; overflow: hidden; }
        
        #area-chamada { flex: 1.5; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 10px solid var(--primary); }
        .nome-paciente { font-size: 5rem; color: var(--accent); font-weight: bold; text-align: center; margin: 20px 0; }
        .sala-box { padding: 15px 40px; background: var(--primary); color: white; border-radius: 10px; font-size: 3rem; }

        #area-lateral { flex: 1; display: flex; flex-direction: column; background: black; }
        #relogio-container { height: 120px; background: var(--primary); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* Ajuste do vídeo para não cortar */
        #video-container { flex: 1; background: black; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }

        .piscar { animation: alert 0.8s infinite; }
        @keyframes alert { 0% { background: white; } 50% { background: #fff176; } 100% { background: white; } }
    </style>
</head>
<body>

    <header id="header-estabelecimento">
        <h1>UNIDADE DE SAÚDE MIGUEL KALID </h1>
    </header>

    <div id="corpo">
        <div id="area-chamada" id="chamada-box">
            <div id="senha" style="font-size: 2rem; color: #555;">---</div>
            <div id="nome" class="nome-paciente">AGUARDANDO...</div>
            <div class="sala-box">SALA <span id="sala">--</span></div>
        </div>
        <div id="area-lateral">
            <div id="relogio-container">
                <div id="hora" style="font-size: 3rem; font-weight: bold;">00:00:00</div>
                <div id="data">--/--/----</div>
            </div>
            <div id="video-container">
                <video id="meuPlayer" autoplay muted playsinline>
                    <source src="video1.mp4" type="video/mp4">
                </video>
            </div>
			<div id="container-audio">
    <audio id="somDing" src="meu_som.mp3" preload="auto"></audio>
</div>
        </div>

    <script>
        const firebaseConfig = { 
              apiKey: "AIzaSyAni301REp5IfvRTxxHLxCFWkdPr8Qrt68",
  authDomain: "painel-de-senhas-23.firebaseapp.com",
  databaseURL: "https://painel-de-senhas-23-default-rtdb.firebaseio.com",
  projectId: "painel-de-senhas-23",
        };
        firebase.initializeApp(firebaseConfig);

        // PLAYLIST
        const playlist = ["video1.mp4", "video2.mp4", "vídeo3.mp4" ]; 
        let videoIdx = 0;
        const player = document.getElementById('meuPlayer');

        player.onended = function() {
            videoIdx++;
            if (videoIdx >= playlist.length) videoIdx = 0;
            player.src = playlist[videoIdx];
            player.play().catch(() => console.log("Clique na tela para liberar o vídeo"));
        };

       // --- NOVA FUNÇÃO DE VOZ COM DING ---
        function avisarChamada(texto) {
            const som = document.getElementById('somDing');
            
            // Toca o som de Ding
            som.play().then(() => {
                // Espera 1.5 segundos para o som terminar e começa a falar
                setTimeout(() => {
                    window.speechSynthesis.cancel();
                    const m = new SpeechSynthesisUtterance(texto);
                    m.lang = 'pt-BR';
                    m.rate = 0.9;
                    window.speechSynthesis.speak(m);
                }, 3000); 
            }).catch(e => {
                // Se o som falhar, fala direto (segurança)
                console.log("Som bloqueado, falando direto...");
                window.speechSynthesis.cancel();
                const m = new SpeechSynthesisUtterance(texto);
                m.lang = 'pt-BR';
                window.speechSynthesis.speak(m);
            });
        }

        // --- FIREBASE LISTENER ATUALIZADO ---
        firebase.database().ref('chamada').on('value', (snapshot) => {
            const d = snapshot.val();
            if(!d) return;

            const nomeTela = document.getElementById('nome');
            const senhaTela = document.getElementById('senha');
            const salaTela = document.getElementById('sala');

            if (d.nome === "AGUARDANDO..." || d.nome === "") {
                nomeTela.innerText = "AGUARDANDO...";
                senhaTela.innerText = "---";
                salaTela.innerText = "--";
            } else {
                nomeTela.innerText = d.nome;
                senhaTela.innerText = "SENHA " + d.senha;
                salaTela.innerText = d.sala;
                
                // AQUI FOI SUBSTITUÍDO: de falar() para avisarChamada()
                avisarChamada(`Senha ${d.senha}, ${d.nome}, sala ${d.sala}`);
                
                const box = document.getElementById('area-chamada');
                box.classList.add('piscar');
                setTimeout(() => box.classList.remove('piscar'), 5000);
            }
        });
        // RELÓGIO E CLIQUE INICIAL
        setInterval(() => {
            const agora = new Date();
            document.getElementById('hora').innerText = agora.toLocaleTimeString('pt-BR');
            document.getElementById('data').innerText = agora.toLocaleDateString('pt-BR');
        }, 1000);

       window.addEventListener('click', () => { 
    // 1. Libera o áudio (toca e pausa o ding rapidinho para o navegador autorizar)
    const som = document.getElementById('somDing');
    som.play().then(() => {
        som.pause();
        som.currentTime = 0;
    }).catch(e => console.log("Erro ao liberar áudio:", e));

    // 2. Inicia o vídeo
    player.play(); 
    
    // 3. Tenta entrar em TELA CHEIA
    const elem = document.documentElement;
    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
    }

    console.log("Sistema, áudio e tela cheia liberados!");
}, { once: true });
    </script>
</body>
</html>
