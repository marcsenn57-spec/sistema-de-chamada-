<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Controle da Sala</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .box { background: #34495e; padding: 30px; border-radius: 10px; display: flex; flex-direction: column; gap: 15px; }
        input { padding: 15px; font-size: 1.2rem; border-radius: 5px; border: none; }
        button { padding: 15px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-chamar { background: #27ae60; color: white; }
        .btn-repetir { background: #f39c12; color: white; }
    </style>
</head>
<body>
    <h1>CONTROLE DE CHAMADA</h1>
    <div class="box">
        <label>Nº da Sala:</label>
        <input type="number" id="sala" value="1">
        <label>Nome do Paciente:</label>
        <input type="text" id="nome" placeholder="Digite o nome...">
        <button class="btn-chamar" onclick="enviar(true)">CHAMAR NOVO</button>
        <button class="btn-repetir" onclick="enviar(false)">REPETIR CHAMADA</button>
    </div>

    <script>
        const firebaseConfig = { 
    apiKey: "AIzaSyAni301REp5IfvRTxxHLxCFWkdPr8Qrt68",
  authDomain: "painel-de-senhas-23.firebaseapp.com",
  databaseURL: "https://painel-de-senhas-23-default-rtdb.firebaseio.com",
  projectId: "painel-de-senhas-23",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let contador = 0;

        function enviar(novo) {
            const sala = document.getElementById('sala').value;
            const nome = document.getElementById('nome').value.toUpperCase();
            
            if(novo) {
                if(!nome) return alert("Digite o nome");
                contador++;
            }

            db.ref('chamada').set({
                nome: novo ? nome : document.getElementById('nome').dataset.ultimoNome,
                sala: sala,
                senha: `${String(contador).padStart(3, '0')}`,
                timestamp: Date.now() // Garante que a TV perceba a mudança
            });

            if(novo) {
                document.getElementById('nome').dataset.ultimoNome = nome;
                document.getElementById('nome').value = "";
            }
        }
    </script>
</body>
</html>
