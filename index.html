<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>USF HUMBERTO VIEIRA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --primary: #2c3e50; 
            --accent: #2980b9; 
            --bg: #1a1a1a; 
            --header-h: 70px;
            --footer-h: 120px;
        }

        body { 
            margin: 0; padding: 0; 
            background: var(--bg); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* 1. TOPO */
        #header-estabelecimento { 
            height: var(--header-h); 
            background: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-bottom: 5px solid var(--accent); 
        }
        #header-estabelecimento h1 { color: var(--primary); font-size: 1.8rem; margin: 0; }

        /* 2. CORPO CENTRAL */
        #corpo { flex: 1; display: flex; overflow: hidden; }

        #area-chamada {
            flex: 1.5;
            background-image: url('fundo.png'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 8px solid var(--primary);
            position: relative;
        }

        #senha {
            background-color:#2c3e50;
            color: #ffffff;
            padding: 15px 45px;
            border: 5px solid #d4ac0d;
            border-radius: 30px;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        .nome-paciente {
            font-size: 5.5rem;
            color: #ffffff;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            text-shadow: 4px 4px 15px rgba(0, 0, 0, 0.8);
        }

        .sala-box {
            margin-top: 20px;
            padding: 10px 50px;
            background: var(--primary);
            color: #ffffff;
            border-radius: 30px;
            font-size: 3.5rem;
            font-weight: bold;
            border: 4px solid var(--accent);
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
        }

        #sala { color: #f1c40f; }

        #area-lateral { flex: 1; display: flex; flex-direction: column; background: black; }

        #relogio-container { 
            height: 130px; 
            background: var(--primary); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }

        #video-container { flex: 1; background: black; overflow: hidden; display: flex; align-items: center; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* 3. RODAPÉ (HISTÓRICO) */
        #historico-rodape {
            height: var(--footer-h);
            background: #2c3e50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-top: 6px solid var(--accent);
            width: 100%;
        }

        .titulo-historico { font-size: 1rem; font-weight: bold; color: #7f8c8d; margin-bottom: 8px; }

        #lista-historico {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 95%;
        }

        .item-hist {
            background: #f8f9fa;
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid var(--accent);
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            flex: 1;
            text-align: center;
        }

        .piscar { animation: alert 0.8s infinite; }
        @keyframes alert { 0%, 100% { background-color: rgba(255,255,255,0); } 50% { background-color: rgba(241, 196, 15, 0.4); } }
    </style>
</head>
<body>

    <header id="header-estabelecimento">
        <h1>UNIDADE DE SAÚDE HUMBERTO VIEIRA</h1>
    </header>

    <div id="corpo">
        <div id="area-chamada">
            <div id="senha">---</div>
            <div id="nome" class="nome-paciente">AGUARDANDO...</div>
            <div class="sala-box">SALA <span id="sala">--</span></div>
        </div>

        <div id="area-lateral">
            <div id="relogio-container">
                <div id="hora" style="font-size: 3.5rem; font-weight: bold;">00:00:00</div>
                <div id="data" style="font-size: 1.2rem;">--/--/----</div>
            </div>
            <div id="video-container">
                <video id="meuPlayer" autoplay muted playsinline>
                    <source src="video1.mp4" type="video/mp4">
                </video>
            </div>
        </div>
    </div>

    <div id="historico-rodape">
        <div class="titulo-historico">ÚLTIMAS CHAMADAS</div>
        <div id="lista-historico">
            <div class="item-hist">--</div>
            <div class="item-hist">--</div>
            <div class="item-hist">--</div>
            <div class="item-hist">--</div>
        </div>
    </div>

    <audio id="somDing" src="meu_som.mp3" preload="auto"></audio>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAni301REp5IfvRTxxHLxCFWkdPr8Qrt68",
            authDomain: "painel-de-senhas-23.firebaseapp.com",
            databaseURL: "https://painel-de-senhas-23-default-rtdb.firebaseio.com",
            projectId: "painel-de-senhas-23",
        };
        firebase.initializeApp(firebaseConfig);

        let historicoSenhas = JSON.parse(localStorage.getItem('meuHistorico')) || [];
        const playlist = ["video1.mp4", "video2.mp4", "video3.mp4"]; 
        let videoIdx = 0;
        const player = document.getElementById('meuPlayer');

        function renderizarHistorico() {
            const itens = document.querySelectorAll('.item-hist');
            itens.forEach(item => item.innerText = "--");
            historicoSenhas.forEach((texto, i) => {
                if(itens[i]) itens[i].innerText = texto;
            });
        }

        function avisarChamada(texto) {
            const som = document.getElementById('somDing');
            som.currentTime = 0;
            som.play().then(() => {
                setTimeout(() => {
                    window.speechSynthesis.cancel();
                    const m = new SpeechSynthesisUtterance(texto);
                    m.lang = 'pt-BR';
                    m.rate = 0.9;
                    window.speechSynthesis.speak(m);
                }, 2500);
            }).catch(() => {
                window.speechSynthesis.cancel();
                const m = new SpeechSynthesisUtterance(texto);
                m.lang = 'pt-BR';
                window.speechSynthesis.speak(m);
            });
        }

        // FIREBASE LISTENER ÚNICO E CORRIGIDO
        firebase.database().ref('chamada').on('value', (snapshot) => {
            const d = snapshot.val();
            if(!d) return;

            // 1. Comando de Limpar Histórico
            if (d.comando === "LIMPAR_HISTORICO") {
                historicoSenhas = [];
                localStorage.removeItem('meuHistorico');
                renderizarHistorico();
                return;
            }

            const nomeTela = document.getElementById('nome');
            const senhaTela = document.getElementById('senha');
            const salaTela = document.getElementById('sala');

            // 2. Se estiver aguardando
            if (d.nome === "AGUARDANDO..." || d.nome === "") {
                nomeTela.innerText = "AGUARDANDO...";
                senhaTela.innerText = "---";
                salaTela.innerText = "--";
                return;
            }

            // 3. Lógica do Histórico (só move se o nome mudar)
            if (d.nome !== nomeTela.innerText && nomeTela.innerText !== "AGUARDANDO...") {
                const antiga = `${senhaTela.innerText} - SL ${salaTela.innerText}`;
                historicoSenhas.unshift(antiga);
                if(historicoSenhas.length > 4) historicoSenhas.pop();
                localStorage.setItem('meuHistorico', JSON.stringify(historicoSenhas));
                renderizarHistorico();
            }

            // 4. Atualiza a tela e chama voz
            nomeTela.innerText = d.nome;
            senhaTela.innerText = "SENHA " + d.senha;
            salaTela.innerText = d.sala;
            
            avisarChamada(`Senha ${d.senha}, ${d.nome}, sala ${d.sala}`);
            
            const box = document.getElementById('area-chamada');
            box.classList.remove('piscar'); 
            void box.offsetWidth;          
            box.classList.add('piscar');
            setTimeout(() => box.classList.remove('piscar'), 5000);
        });

        player.onended = function() {
            videoIdx = (videoIdx + 1) % playlist.length;
            player.src = playlist[videoIdx];
            player.play();
        };

        setInterval(() => {
            const agora = new Date();
            document.getElementById('hora').innerText = agora.toLocaleTimeString('pt-BR');
            document.getElementById('data').innerText = agora.toLocaleDateString('pt-BR');
        }, 1000);

        window.addEventListener('click', () => { 
            document.getElementById('somDing').play().then(() => { 
                document.getElementById('somDing').pause(); 
            });
            player.play(); 
            const elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
            renderizarHistorico();
        }, { once: true });

    </script>
</body>
</html>
